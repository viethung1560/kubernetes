apiVersion: v1
kind: Namespace
metadata:
  name: nginxdev1

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deploy
  namespace: nginxdev1

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx-client1

  template:
    metadata:
      labels:
        app: nginx-client1

    spec:
      containers:
        - name: nginx
          image: nginx:1.30.1

          ports:
            - name: web
              containerPort: 80
              protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
  namespace: nginxdev1

spec:
  type: LoadBalancer

  selector:
    app: nginx-client1

  ports:
    - name: web
      port: 8081
      targetPort: 80
      protocol: TCP
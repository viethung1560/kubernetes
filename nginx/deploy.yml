apiVersion v1
kind Namespace
metadata
  name nginxdev1
---
apiVersion v1
kind Deployment
metadata
  name nginx-deploy
  namespace nginxdev1
spec
  selector
    matchLabels
      app
        nginx-client1
    replicas 1
    template
      metadata
        labels
          app nginx-client1
        spec
          containers
            - name nginx
              image nginx1.30.1
              ports
                - name web
                  protocol TCP
                  containerPort 80
---
apiVersion v1
kind Service
metadata
  name nginx-svc
  namespace nginxdev1
spec
  type LoadBalancer
  selector
    app nginx-client1
  ports
    - name web
      port 8081
      targetPort 80
      protocol TCP